name: CI

on:
  push:
  pull_request:

jobs:
  lint_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - shared
          - services/auth
          - services/orders
          - services/notifications
          - services/gateway

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install deps
        working-directory: ${{ matrix.service }}
        run: |
          uv venv
          uv sync --dev
          uv pip install -e .

      - name: Install shared into service env
        if: matrix.service != 'shared'
        working-directory: ${{ matrix.service }}
        run: |
          uv pip install -e ../../shared

      - name: Ruff format check
        working-directory: ${{ matrix.service }}
        run: uv run ruff format --check .

      - name: Ruff lint check
        working-directory: ${{ matrix.service }}
        run: uv run ruff check .

      - name: Pytest
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d tests ]; then
            uv run pytest -q
          else
            echo "No tests directory in ${{ matrix.service }}, skipping pytest"
          fi